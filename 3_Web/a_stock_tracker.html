<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股个股跟踪</title>
    <style>
        :root { --bg:#0f172a; --panel:#1e293b; --text:#e2e8f0; --sub:#94a3b8; --line:rgba(148,163,184,.3); --accent:#3b82f6; --up:#ef4444; --down:#22c55e; }
        *{box-sizing:border-box}
        body{margin:0;background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",sans-serif;height:100vh;display:flex;overflow:hidden}
        .sidebar{width:220px;background:#111827;border-right:1px solid var(--line);display:flex;flex-direction:column}
        .brand{padding:16px;font-weight:700;border-bottom:1px solid var(--line)}
        .menu{padding:8px}.menu-item{padding:10px 12px;border-radius:6px;background:#1f2937;color:#cbd5e1;font-size:14px}
        .back{margin-top:auto;padding:14px;border-top:1px solid var(--line)} .back a{display:block;text-align:center;color:var(--sub);text-decoration:none;border:1px solid var(--line);padding:8px;border-radius:6px}
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .header{padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
        .title{font-weight:700;margin-right:8px}
        .ctrl{display:flex;gap:8px;align-items:center;color:var(--sub);font-size:13px}
        input,button{background:#0b1220;border:1px solid var(--line);color:#cbd5e1;border-radius:6px;padding:6px 8px}
        button{cursor:pointer}
        .module-panel{display:flex;gap:8px;flex-wrap:wrap;max-width:100%}
        .check{font-size:12px;background:#0b1220;padding:3px 6px;border:1px solid var(--line);border-radius:999px}
        .table-wrap{flex:1;overflow:auto}
        table{border-collapse:collapse;min-width:2800px;width:max-content}
        thead th{position:sticky;top:0;background:#1e293b;z-index:10}
        th,td{border-bottom:1px solid rgba(148,163,184,.15);padding:8px 10px;white-space:nowrap;font-size:12px;text-align:right}
        th{cursor:pointer;color:#cbd5e1} th:hover{background:#273549}
        th:first-child, td:first-child{position:sticky;left:0;z-index:11;background:#111827;text-align:left}
        th:nth-child(2), td:nth-child(2){position:sticky;left:110px;z-index:11;background:#111827;text-align:left}
        th:first-child,td:first-child{min-width:110px} th:nth-child(2),td:nth-child(2){min-width:140px}
        .up{color:var(--up)} .down{color:var(--down)} .sort{color:#93c5fd}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">🧾 A股个股跟踪</div>
        <div class="menu"><div class="menu-item">A股个股跟踪模块</div></div>
        <div class="back"><a href="index.html">← 返回门户首页</a></div>
    </aside>
    <main class="main">
        <div class="header">
            <div class="title">A股个股跟踪</div>
            <div class="ctrl">搜索 <input id="search" placeholder="代码 / 名称"></div>
            <div class="ctrl">成交额阈值(亿) > <input id="amountThreshold" type="number" step="0.1" value="15"></div>
            <button onclick="applyFilters()">应用</button>
            <div class="module-panel" id="modulePanel"></div>
        </div>
        <div class="table-wrap" id="tableWrap"></div>
    </main>

<script>
const RAW = {{STOCK_TRACKER_DATA}};
const MODULES = {
    basic: '基本信息', monthly: '月度价格行为', pct: '涨跌幅', amount: '成交额', drawdown: '最大回撤与回升', ma: '均线', excess: '超额收益'
};
const state = { sortKey: '当日涨跌幅(%)', sortDir: 'desc', search: '', amountThreshold: 15, modules: new Set(Object.keys(MODULES)) };

function toNum(v){ if(v===null||v===undefined||v==='') return null; const n=Number(v); return Number.isFinite(n)?n:null; }
function format(key, v){ if(v===null||v===undefined||v==='') return '-';
    if(key.includes('成交额')||key.includes('市值')) return `${Number(v).toFixed(1)}`;
    if(key.includes('涨跌幅')||key.includes('回撤')||key.includes('回升')||key.includes('斜率')||key.includes('乖离率')||key.includes('振幅')) return `${Number(v).toFixed(1)}%`;
    return v;
}
function cls(key,v){ const n=toNum(v); if(n===null) return ''; if(key.includes('涨跌幅')||key.includes('超额')||key.includes('回升')||key.includes('斜率')||key.includes('乖离率')) return n>=0?'up':'down'; return ''; }

function getVisibleColumns(){
    return RAW.columns.filter(c => state.modules.has(c.module));
}

function applyFilters(){
    state.search = document.getElementById('search').value.trim();
    state.amountThreshold = Number(document.getElementById('amountThreshold').value || 15);
    render();
}

function toggleModule(key, checked){ if(checked) state.modules.add(key); else state.modules.delete(key); render(); }

function sortRows(rows){
    const key=state.sortKey, dir=state.sortDir;
    rows.sort((a,b)=>{
        const va=a[key], vb=b[key];
        const na=toNum(va), nb=toNum(vb);
        if(na!==null && nb!==null) return dir==='asc'?na-nb:nb-na;
        const sa=String(va??''), sb=String(vb??'');
        return dir==='asc'?sa.localeCompare(sb,'zh'):sb.localeCompare(sa,'zh');
    });
}

function render(){
    const cols=getVisibleColumns();
    const rows=RAW.rows.filter(r=>{
        const amt=toNum(r['当日成交额(亿)']);
        if(amt===null || amt<=state.amountThreshold) return false;
        if(!state.search) return true;
        return String(r['证券代码']).includes(state.search) || String(r['证券名称']).includes(state.search);
    });
    sortRows(rows);

    let html='<table><thead><tr>';
    cols.forEach(c=>{ const s = state.sortKey===c.key ? (state.sortDir==='asc'?' ▲':' ▼') : ''; html += `<th onclick="onSort('${c.key.replace(/'/g,"\\'")}')" class="${s?'sort':''}">${c.label}${s}</th>`;});
    html+='</tr></thead><tbody>';
    rows.forEach(r=>{ html+='<tr>'; cols.forEach(c=>{ const v=r[c.key]; html += `<td class="${cls(c.key,v)}">${format(c.key,v)}</td>`; }); html+='</tr>'; });
    html+='</tbody></table>';
    document.getElementById('tableWrap').innerHTML=html;
}

function onSort(key){ if(state.sortKey===key){state.sortDir=state.sortDir==='asc'?'desc':'asc';}else{state.sortKey=key; state.sortDir='desc';} render(); }

function init(){
    const panel=document.getElementById('modulePanel');
    Object.entries(MODULES).forEach(([k,v])=>{
        const el=document.createElement('label'); el.className='check';
        el.innerHTML=`<input type="checkbox" checked onchange="toggleModule('${k}',this.checked)"> ${v}`;
        panel.appendChild(el);
    });
    render();
}
init();
</script>
</body>
</html>
